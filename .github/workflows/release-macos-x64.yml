name: Build Releases macOS x64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SC_VERSION: "3.14.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_macos_x64:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone SuperCollider source
        run: git clone --depth 1 --branch Version-${{ env.SC_VERSION }} https://github.com/supercollider/supercollider.git external/supercollider

      - name: Build all ports
        run: >
          python scripts/build_release.py
          --sc-path external/supercollider
          --build-root build
          --stage-root stage/Extensions

      - name: Package release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          python scripts/package_release.py \
            --stage-root stage/Extensions \
            --output-dir dist \
            --version "$VERSION" \
            --platform macos-intel

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChowDSP-SC-Ports-macos-intel
          path: dist/*.zip

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
