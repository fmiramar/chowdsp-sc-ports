name: Build Releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  SC_VERSION: "3.14.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64-ubuntu-22.04
          - os: ubuntu-24.04
            platform: linux-x64-ubuntu-24.04
          - os: ubuntu-24.04-arm
            platform: linux-arm64-ubuntu-24.04
          - os: windows-2022
            platform: windows-x64
            cmake_generator: Visual Studio 17 2022
            cmake_arch: x64
          - os: windows-2022
            platform: windows-x86
            cmake_generator: Visual Studio 17 2022
            cmake_arch: Win32
          - os: macos-15-intel
            platform: macos-x64
            cmake_osx_architectures: x86_64
          - os: macos-15
            platform: macos-universal
            cmake_osx_architectures: x86_64;arm64
          - os: macos-15
            platform: macos-apple-silicon
            cmake_osx_architectures: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Clone SuperCollider source
        run: git clone --depth 1 --branch Version-${{ env.SC_VERSION }} https://github.com/supercollider/supercollider.git external/supercollider

      - name: Build all ports
        shell: bash
        env:
          CMAKE_GENERATOR_ARG: ${{ matrix.cmake_generator }}
          CMAKE_ARCH_ARG: ${{ matrix.cmake_arch }}
          CMAKE_OSX_ARCHITECTURES_ARG: ${{ matrix.cmake_osx_architectures }}
        run: |
          cmake_args=()
          if [[ -n "$CMAKE_GENERATOR_ARG" ]]; then
            cmake_args+=(--cmake-generator "$CMAKE_GENERATOR_ARG")
          fi
          if [[ -n "$CMAKE_ARCH_ARG" ]]; then
            cmake_args+=(--cmake-arch "$CMAKE_ARCH_ARG")
          fi
          if [[ -n "$CMAKE_OSX_ARCHITECTURES_ARG" ]]; then
            cmake_args+=(--cmake-osx-architectures "$CMAKE_OSX_ARCHITECTURES_ARG")
          fi

          python scripts/build_release.py \
          --sc-path external/supercollider \
          --build-root build \
          --stage-root stage/Extensions \
          "${cmake_args[@]}"

      - name: Package release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          python scripts/package_release.py \
            --stage-root stage/Extensions \
            --output-dir dist \
            --version "$VERSION" \
            --platform "${{ matrix.platform }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChowDSP-SC-Ports-${{ matrix.platform }}
          path: dist/*.zip

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
